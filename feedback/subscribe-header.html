<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; padding: 0; }
  .banner {
    width: 100vw;
    height: 100vh;
    background: #376ae2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif;
  }
  .logo {
    font-size: 24px;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.12em;
    margin-bottom: 20px;
  }
  .title {
    font-size: 52px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 12px;
  }
  .sub {
    font-size: 24px;
    color: rgba(255,255,255,0.6);
  }
</style>
</head>
<body>
<div class="banner">
  <div class="logo">STORE LETTER</div>
  <div class="title">구독 신청</div>
  <div class="sub">매주 발주에 도움되는 트렌드를 보내드려요</div>
</div>
</body>
</html>
